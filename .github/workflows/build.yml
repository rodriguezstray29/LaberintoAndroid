name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip git zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev zlib1g-dev \
          libncurses5-dev libgdbm-dev libnss3-dev \
          libreadline-dev libsqlite3-dev wget \
          autoconf automake libtool pkg-config cmake \
          build-essential ccache

    - name: Instalar buildozer y cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Aceptar licencias Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        yes | sdkmanager --licenses 2>/dev/null || true

    - name: Compilar APK
      run: |
        buildozer -v android debug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: laberinto-apk
        path: bin/*.apk
